config firewall ippool
    edit "hq-outbound-pool"
        set startip 203.0.113.1
        set endip 203.0.113.50
        set arp-reply enable
        set block-size 1
    next
    edit "branch-outbound-pool"
        set startip 203.0.113.100
        set endip 203.0.113.110
        set arp-reply enable
    next
    edit "iot-outbound-pool"
        set startip 203.0.113.200
        set endip 203.0.113.210
        set arp-reply enable
    next
    edit "web-static-pool"
        set startip 203.0.113.10
        set endip 203.0.113.10
        set arp-reply enable
    next
end

config firewall central-nat
    edit 1
        set status enable
        set srcintf "port2"
        set dstintf "port1"
        set src-addr "HQ-All-Buildings"
        set ippool "hq-outbound-pool"
        set protocol 6
    next
    edit 2
        set status enable
        set srcintf "port2"
        set dstintf "port1"
        set src-addr "Branch-All"
        set ippool "branch-outbound-pool"
        set protocol 6
    next
    edit 3
        set status enable
        set srcintf "port1"
        set dstintf "port5"
        set dst-addr "203.0.113.10"
        set extip 10.100.10.10
        set service "HTTP-SVC"
        set protocol 6
    next
    edit 4
        set status enable
        set srcintf "port1"
        set dstintf "port5"
        set dst-addr "203.0.113.10"
        set extip 10.100.10.10
        set service "HTTPS-SVC"
        set protocol 6
    next
    edit 5
        set status enable
        set srcintf "port7"
        set dstintf "port1"
        set src-addr "IoT-Network"
        set ippool "iot-outbound-pool"
        set protocol 6
    next
end
