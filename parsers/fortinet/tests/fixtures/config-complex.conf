config system global
    set hostname "fgt-enterprise"
    set firmware "FortiOS 7.4.3"
end

config system vdom
    edit "root"
    next
    edit "dmz-vdom"
    next
end

config system interface
    edit "port1"
        set mode static
        set ip 203.0.113.1/24
        set allowaccess ping https ssh
    next
    edit "port2"
        set mode static
        set ip 10.1.0.1/16
        set allowaccess ping
    next
    edit "port3"
        set mode static
        set ip 10.2.0.1/16
        set allowaccess ping
    next
    edit "port4"
        set mode static
        set ip 10.3.0.1/16
        set allowaccess ping
    next
    edit "port5"
        set mode static
        set ip 10.100.0.1/16
        set allowaccess ping
    next
    edit "port6"
        set mode static
        set ip 10.0.250.1/24
        set allowaccess ping https ssh
    next
    edit "port7"
        set mode static
        set ip 10.200.0.1/16
        set allowaccess ping
    next
    edit "vlan100"
        set vlanid 100
        set interface "port1"
        set mode static
        set ip 203.0.113.100/24
    next
end

config firewall zone
    edit "trust"
        set interface "port2" "port3" "port4"
    next
    edit "untrust"
        set interface "port1"
    next
    edit "dmz"
        set interface "port5"
    next
    edit "management"
        set interface "port6"
    next
    edit "iot"
        set interface "port7"
    next
end

config firewall address
    edit "HQ-All"
        set type ipmask
        set subnet 10.0.0.0/8
        set comment "Entire HQ address space"
    next
    edit "HQ-Building-A"
        set type ipmask
        set subnet 10.1.0.0/16
    next
    edit "HQ-Building-B"
        set type ipmask
        set subnet 10.2.0.0/16
    next
    edit "HQ-Building-C"
        set type ipmask
        set subnet 10.3.0.0/16
    next
    edit "Branch-1"
        set type ipmask
        set subnet 172.16.1.0/24
    next
    edit "Branch-2"
        set type ipmask
        set subnet 172.16.2.0/24
    next
    edit "DataCenter"
        set type ipmask
        set subnet 10.100.0.0/16
    next
    edit "DC-Web-Tier"
        set type ipmask
        set subnet 10.100.10.0/24
    next
    edit "DC-App-Tier"
        set type ipmask
        set subnet 10.100.20.0/24
    next
    edit "DC-DB-Tier"
        set type ipmask
        set subnet 10.100.30.0/24
    next
    edit "DC-Primary-Web"
        set type ipmask
        set subnet 10.100.10.10/32
    next
    edit "DC-Secondary-Web"
        set type ipmask
        set subnet 10.100.10.11/32
    next
    edit "DC-Primary-DB"
        set type ipmask
        set subnet 10.100.30.10/32
    next
    edit "IoT-Network"
        set type ipmask
        set subnet 10.200.0.0/16
    next
    edit "Camera-Network"
        set type ipmask
        set subnet 10.200.1.0/24
    next
    edit "Printer-Network"
        set type ipmask
        set subnet 10.200.2.0/24
    next
    edit "Partner-Network"
        set type ipmask
        set subnet 192.168.100.0/24
    next
    edit "External-CDN"
        set type iprange
        set start-ip 151.101.0.1
        set end-ip 151.101.255.254
    next
    edit "NVR-Recorder"
        set type ipmask
        set subnet 10.200.5.10/32
    next
    edit "Vendor-IP"
        set type ipmask
        set subnet 10.100.10.50/32
    next
end

config firewall addrgrp
    edit "HQ-All-Buildings"
        set member "HQ-Building-A" "HQ-Building-B" "HQ-Building-C"
    next
    edit "DC-Web-Tier-All"
        set member "DC-Primary-Web" "DC-Secondary-Web"
    next
    edit "DC-All-Tiers"
        set member "DC-Web-Tier" "DC-App-Tier" "DC-DB-Tier"
    next
    edit "All-Internal"
        set member "HQ-All" "Branch-1" "Branch-2" "DataCenter" "IoT-Network"
    next
    edit "Branch-All"
        set member "Branch-1" "Branch-2"
    next
    edit "IoT-All"
        set member "Camera-Network" "Printer-Network" "IoT-Network"
    next
end

config firewall service custom
    edit "HTTP-SVC"
        set protocol TCP
        set tcp-portrange 80
    next
    edit "HTTPS-SVC"
        set protocol TCP
        set tcp-portrange 443
    next
    edit "SSH-SVC"
        set protocol TCP
        set tcp-portrange 22
    next
    edit "RDP-SVC"
        set protocol TCP
        set tcp-portrange 3389
    next
    edit "DNS-SVC"
        set protocol UDP
        set udp-portrange 53
    next
    edit "MYSQL-SVC"
        set protocol TCP
        set tcp-portrange 3306
    next
    edit "LDAP-SVC"
        set protocol TCP
        set tcp-portrange 389
    next
    edit "LDAPS-SVC"
        set protocol TCP
        set tcp-portrange 636
    next
    edit "SYSLOG-SVC"
        set protocol UDP
        set udp-portrange 514
    next
    edit "SNMP-SVC"
        set protocol UDP
        set udp-portrange 161
    next
    edit "SMTP-SVC"
        set protocol TCP
        set tcp-portrange 25
    next
end

config firewall service group
    edit "Web-Services"
        set member "HTTP-SVC" "HTTPS-SVC"
    next
    edit "Directory-Services"
        set member "LDAP-SVC" "LDAPS-SVC"
    next
    edit "Monitoring-Services"
        set member "SYSLOG-SVC" "SNMP-SVC"
    next
end

