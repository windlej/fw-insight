config system global
    set hostname "fgt-vm-01"
    set firmware "FortiOS 7.4.3"
end

config system interface
    edit "port1"
        set mode static
        set ip 203.0.113.1/24
        set allowaccess ping https ssh
    next
    edit "port2"
        set mode static
        set ip 10.0.1.1/24
        set allowaccess ping
    next
end

config firewall address
    edit "internal-net"
        set type ipmask
        set subnet 10.0.1.0/24
        set comment "Internal network segment"
    next
    edit "dmz-servers"
        set type ipmask
        set subnet 10.0.50.0/24
        set comment "DMZ server network"
    next
end

config firewall service custom
    edit "HTTPS-CUSTOM"
        set protocol TCP
        set tcp-portrange 443
        set comment "HTTPS service"
    next
end

config firewall policy
    edit 1
        set name "allow-internal-web"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "internal-net"
        set dstaddr "dmz-servers"
        set service "HTTPS-CUSTOM"
        set action accept
        set logtraffic all
        set status enable
    next
    edit 2
        set name "deny-all"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action deny
        set logtraffic all
        set status enable
    next
end

config firewall ippool
    edit "outbound-pool"
        set startip 203.0.113.10
        set endip 203.0.113.10
        set arp-reply enable
    next
end

config firewall central-nat
    edit 1
        set status enable
        set srcintf "port2"
        set dstintf "port1"
        set src-addr "internal-net"
        set ippool "outbound-pool"
        set protocol 6
    next
end
