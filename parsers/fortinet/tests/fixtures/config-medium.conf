config system global
    set hostname "fgt-prod-01"
    set firmware "FortiOS 7.4.3"
end

config system interface
    edit "port1"
        set mode static
        set ip 203.0.113.1/24
        set allowaccess ping https ssh
    next
    edit "port2"
        set mode static
        set ip 10.10.0.1/16
        set allowaccess ping
    next
    edit "port3"
        set mode static
        set ip 10.10.100.1/24
        set allowaccess ping
    next
    edit "port4"
        set mode static
        set ip 10.10.200.1/24
        set allowaccess ping
    next
    edit "port5"
        set mode static
        set ip 10.10.250.1/24
        set allowaccess ping https ssh
    next
    edit "dmz-zone"
        set mode static
        set ip 10.10.50.1/24
        set allowaccess ping
    next
end

config firewall zone
    edit "internal"
        set interface "port2"
    next
    edit "dmz"
        set interface "port3" "dmz-zone"
    next
    edit "guest"
        set interface "port4"
    next
    edit "management"
        set interface "port5"
    next
end

config firewall address
    edit "Corporate-LAN"
        set type ipmask
        set subnet 10.10.0.0/16
        set comment "Corporate LAN - all subnets"
    next
    edit "Server-Farm"
        set type ipmask
        set subnet 10.10.100.0/24
        set comment "Server farm network"
    next
    edit "DB-Server"
        set type ipmask
        set subnet 10.10.100.10/32
        set comment "Primary database server"
    next
    edit "Web-Server"
        set type ipmask
        set subnet 10.10.100.20/32
        set comment "Primary web server"
    next
    edit "Guest-WiFi"
        set type ipmask
        set subnet 10.10.200.0/24
        set comment "Guest wireless network"
    next
    edit "Management"
        set type ipmask
        set subnet 10.10.250.0/24
        set comment "Management network"
    next
    edit "External-CDN"
        set type iprange
        set start-ip 151.101.0.1
        set end-ip 151.101.255.254
    next
    edit "mail-server"
        set type fqdn
        set fqdn "mail.example.com"
    next
end

config firewall addrgrp
    edit "All-Servers"
        set member "Server-Farm" "DB-Server" "Web-Server"
        set comment "All server addresses"
    next
end

config firewall service custom
    edit "HTTP-SVC"
        set protocol TCP
        set tcp-portrange 80
    next
    edit "HTTPS-SVC"
        set protocol TCP
        set tcp-portrange 443
    next
    edit "SSH-SVC"
        set protocol TCP
        set tcp-portrange 22
    next
    edit "RDP-SVC"
        set protocol TCP
        set tcp-portrange 3389
    next
    edit "DNS-SVC"
        set protocol UDP
        set udp-portrange 53
    next
    edit "MYSQL-SVC"
        set protocol TCP
        set tcp-portrange 3306
    next
    edit "SMTP-SVC"
        set protocol TCP
        set tcp-portrange 25
    next
    edit "Wide-Port-Range"
        set protocol TCP
        set tcp-portrange "1024-65535"
    next
end

config firewall service group
    edit "Web-Services"
        set member "HTTP-SVC" "HTTPS-SVC"
    next
end

config firewall policy
    edit 1
        set name "Allow-Corp-Web"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "Corporate-LAN"
        set dstaddr "all"
        set service "Web-Services"
        set action accept
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 2
        set name "Allow-Corp-DNS"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "Corporate-LAN"
        set dstaddr "all"
        set service "DNS-SVC"
        set action accept
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 3
        set name "Allow-Guest-Web"
        set srcintf "port4"
        set dstintf "port1"
        set srcaddr "Guest-WiFi"
        set dstaddr "all"
        set service "HTTPS-SVC"
        set action accept
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 4
        set name "Allow-Mgmt-SSH"
        set srcintf "port5"
        set dstintf "port2"
        set srcaddr "Management"
        set dstaddr "Server-Farm"
        set service "SSH-SVC"
        set action accept
        set schedule "always"
        set logtraffic all
        set logtraffic-start enable
        set status enable
        set comments "Management SSH access to servers"
    next
    edit 5
        set name "Allow-Web-to-DB"
        set srcintf "port3"
        set dstintf "port3"
        set srcaddr "Web-Server"
        set dstaddr "DB-Server"
        set service "MYSQL-SVC"
        set action accept
        set schedule "always"
        set logtraffic all
        set logtraffic-start enable
        set status enable
    next
    edit 6
        set name "Allow-Any-Any-Legacy"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set schedule "always"
        set status enable
        set comments "Legacy rule - needs review"
    next
    edit 7
        set name "Allow-Internet-RDP"
        set srcintf "port1"
        set dstintf "port3"
        set srcaddr "all"
        set dstaddr "Web-Server"
        set service "RDP-SVC"
        set action accept
        set schedule "always"
        set logtraffic all
        set status enable
        set comments "RDP access from internet to web server"
    next
    edit 8
        set name "Deny-Guest-to-Internal"
        set srcintf "port4"
        set dstintf "port2"
        set srcaddr "Guest-WiFi"
        set dstaddr "Corporate-LAN"
        set service "ALL"
        set action deny
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 9
        set name "Deny-Guest-to-Server"
        set srcintf "port4"
        set dstintf "dmz-zone"
        set srcaddr "Guest-WiFi"
        set dstaddr "All-Servers"
        set service "ALL"
        set action deny
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 10
        set name "Allow-Corp-SMTP"
        set srcintf "port2"
        set dstintf "dmz-zone"
        set srcaddr "Corporate-LAN"
        set dstaddr "mail-server"
        set service "SMTP-SVC"
        set action accept
        set schedule "always"
        set logtraffic utm
        set status enable
    next
    edit 11
        set name "Allow-Corp-HTTPS"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "Corporate-LAN"
        set dstaddr "all"
        set service "HTTPS-SVC"
        set action accept
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 12
        set name "Disabled-Old-Rule"
        set srcintf "port2"
        set dstintf "port1"
        set srcaddr "Corporate-LAN"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set schedule "always"
        set logtraffic all
        set status disable
        set comments "Disabled - replaced by Allow-Corp-Web"
    next
    edit 13
        set name "Allow-Mgmt-Monitoring"
        set srcintf "port5"
        set dstintf "any"
        set srcaddr "Management"
        set dstaddr "All-Servers"
        set service "DNS-SVC" "SSH-SVC"
        set action accept
        set schedule "always"
        set status enable
    next
    edit 14
        set name "Allow-Wide-Range"
        set srcintf "port2"
        set dstintf "port3"
        set srcaddr "Corporate-LAN"
        set dstaddr "Server-Farm"
        set service "Wide-Port-Range"
        set action accept
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 15
        set name "Deny-All"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action deny
        set schedule "always"
        set logtraffic all
        set status enable
    next
    edit 16
        set name "Any-Any-Test"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set service "ALL"
        set action accept
        set schedule "always"
        set status enable
        set comments "Test rule for any-to-any detection"
    next
end

config firewall ippool
    edit "corp-outbound-pool"
        set startip 198.51.100.1
        set endip 198.51.100.10
        set arp-reply enable
        set block-size 1
    next
    edit "guest-outbound-pool"
        set startip 198.51.100.20
        set endip 198.51.100.30
        set arp-reply enable
    next
end

config firewall central-nat
    edit 1
        set status enable
        set srcintf "port2"
        set dstintf "port1"
        set src-addr "Corporate-LAN"
        set ippool "corp-outbound-pool"
        set protocol 6
    next
    edit 2
        set status enable
        set srcintf "port4"
        set dstintf "port1"
        set src-addr "Guest-WiFi"
        set ippool "guest-outbound-pool"
        set protocol 6
    next
    edit 3
        set status enable
        set srcintf "any"
        set dstintf "port3"
        set dst-addr "198.51.100.5"
        set extip 10.10.100.20
        set service "HTTP-SVC"
        set protocol 6
    next
end
