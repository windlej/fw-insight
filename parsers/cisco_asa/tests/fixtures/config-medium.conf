ASA Version 9.16(3)
hostname asa-prod-01
domain-name company.com
!
interface GigabitEthernet0/0
 nameif outside
 ip address 198.51.100.1 255.255.255.0
 security-level 0
 no shutdown
!
interface GigabitEthernet0/1
 nameif inside
 ip address 10.10.0.1 255.255.255.0
 security-level 100
 no shutdown
!
interface GigabitEthernet0/2
 nameif dmz
 ip address 172.16.0.1 255.255.255.0
 security-level 50
 no shutdown
!
interface Management0/0
 nameif mgmt
 ip address 192.168.1.1 255.255.255.0
 security-level 100
 shutdown
!
name 10.10.0.100 APP_SERVER
name 10.10.0.101 DB_SERVER
!
object network MAIL_SERVER
 host 172.16.0.10
 description Internal mail server
!
object network DNS_SERVER
 host 172.16.0.11
!
object network DMZ_SUBNET
 subnet 172.16.0.0 255.255.255.0
 description DMZ network
!
object network RDP_JUMP
 host 10.10.0.50
!
object network EXTERNAL_DNS
 fqdn ns1.cloud-provider.com
!
object-group network ALL_SERVERS
 description All server subnets
 network-object 10.10.0.0 255.255.255.0
 network-object 172.16.0.0 255.255.255.0
!
object-group network EXTERNAL_CDN
 network-object object ALL_SERVERS
 network-object object MAIL_SERVER
!
object-group service WEB_PORTS tcp
 description Standard web ports
 port-object eq 80
 port-object eq 443
!
object-group service MAIL_PORTS tcp
 port-object eq 25
 port-object eq 587
 port-object eq 993
!
access-list OUTSIDE-IN extended permit tcp any host 172.16.0.10 eq 25
access-list OUTSIDE-IN extended permit tcp any host 172.16.0.10 eq 587
access-list OUTSIDE-IN extended permit tcp any object DNS_SERVER eq 53
access-list OUTSIDE-IN extended deny ip any any log
!
access-list INSIDE-OUT extended permit tcp any4 any4 eq 80
access-list INSIDE-OUT extended permit tcp any4 any4 eq 443
access-list INSIDE-OUT extended permit udp any4 any4 eq 53
access-list INSIDE-OUT extended permit icmp any4 any4
access-list INSIDE-OUT extended deny ip any any
!
access-list DMZ-ACCESS extended permit tcp object MAIL_SERVER object APP_SERVER eq 3306
access-list DMZ-ACCESS extended permit tcp object MAIL_SERVER object DNS_SERVER eq 53
access-list DMZ-ACCESS extended permit tcp object RDP_JUMP host 10.10.0.10 eq 3389
access-list DMZ-ACCESS extended permit icmp any any
access-list DMZ-ACCESS extended deny ip any any log
!
access-group OUTSIDE-IN in interface outside
access-group INSIDE-OUT in interface inside
access-group DMZ-ACCESS in interface dmz
!
object network MAIL_SERVER
 nat (dmz,outside) static 203.0.113.50
!
nat (inside,outside) source dynamic 10.10.0.0 255.255.255.0 interface
