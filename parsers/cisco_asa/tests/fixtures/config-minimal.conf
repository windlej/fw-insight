ASA Version 9.12(4)
hostname asa-vm-01
domain-name example.com
!
interface GigabitEthernet0/0
 nameif outside
 ip address 203.0.113.1 255.255.255.0
 security-level 0
 no shutdown
!
interface GigabitEthernet0/1
 nameif inside
 ip address 10.0.0.1 255.255.255.0
 security-level 100
 no shutdown
!
object network WEB_SERVER
 host 10.0.0.10
 description Internal web server
!
object network DB_SERVER
 host 10.0.0.20
!
object network INTERNAL_SUBNET
 subnet 10.0.1.0 255.255.255.0
!
access-list OUTSIDE-IN extended permit tcp any host 10.0.0.10 eq 80
access-list OUTSIDE-IN extended permit tcp any host 10.0.0.10 eq 443
access-list OUTSIDE-IN extended deny ip any any log
!
access-group OUTSIDE-IN in interface outside
!
object network WEB_SERVER
 nat (inside,outside) static 203.0.113.10
